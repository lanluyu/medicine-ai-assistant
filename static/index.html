<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>药品知识库 AI 助手</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <!-- marked.js: Markdown 渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <!-- highlight.js: 代码高亮 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
</head>
<body>
  <div class="layout">

    <!-- ── 侧边栏 ───────────────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="icon-btn" id="newChatBtn" title="新对话">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
        <span class="sidebar-title">药品助手</span>
        <button class="icon-btn" id="sidebarToggle" title="收起">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
      </div>

      <div class="session-list" id="sessionList">
        <!-- 动态渲染历史会话 -->
      </div>

      <div class="sidebar-footer">
        <div class="disclaimer">仅供参考，不构成医疗建议</div>
      </div>
    </aside>

    <!-- ── 主区域 ───────────────────────────────────────────────── -->
    <main class="main" id="main">

      <!-- 顶栏 -->
      <header class="topbar">
        <button class="icon-btn mobile-only" id="mobileSidebarBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
        <span class="model-tag">Qwen · RAG</span>
      </header>

      <!-- 消息区 -->
      <div class="messages" id="messages">

        <!-- 欢迎屏（无历史时显示）-->
        <div class="welcome" id="welcome">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/>
            </svg>
          </div>
          <h1 class="welcome-title">药品知识库 AI 助手</h1>
          <p class="welcome-sub">基于 10 万份药品说明书，为您提供专业药品信息查询服务</p>

          <div class="example-grid">
            <button class="example-btn" data-q="阿莫西林的用法用量是什么？">
              <span class="example-icon">💊</span>
              <span>阿莫西林的用法用量是什么？</span>
            </button>
            <button class="example-btn" data-q="感冒头痛发烧推荐哪些药？">
              <span class="example-icon">🤒</span>
              <span>感冒头痛发烧推荐哪些药？</span>
            </button>
            <button class="example-btn" data-q="高血压患者感冒了可以吃什么药？">
              <span class="example-icon">❤️</span>
              <span>高血压患者感冒了可以吃什么药？</span>
            </button>
            <button class="example-btn" data-q="儿童发烧推荐哪些退烧药？">
              <span class="example-icon">👶</span>
              <span>儿童发烧推荐哪些退烧药？</span>
            </button>
          </div>
        </div>

      </div><!-- /messages -->

      <!-- 输入区 -->
      <div class="input-area">
        <div class="input-box">
          <textarea
            id="userInput"
            placeholder="询问药品信息、症状推荐、用药注意事项..."
            rows="1"
            maxlength="2000"
          ></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
        <p class="input-tip">回复仅供参考，请在医生或药师指导下用药</p>
      </div>

    </main>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
